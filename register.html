<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CGREENSHOP</title>

    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body class="login-page">
    <div class="modal">
      <div class="tabs">
        <a class="tab" href="login.html">Login</a>
        <a class="tab active" href="register.html">Register</a>
      </div>

      <form class="registration-form">
        <p class="form-text">Enter your email and password to register.</p>

        <input type="text" placeholder="Username" />

        <input type="email" placeholder="Enter your email address" />

        <div class="password">
          <input type="password" placeholder="Password" />
          <img class="eye" src="img/eye.svg" alt="Show password" />
        </div>

        <div class="password">
          <input type="password" placeholder="Confirm Password" />
          <img class="eye" src="img/eye.svg" alt="Show password" />
        </div>

        <button class="register-btn" type="submit">Register</button>
      </form>

      <div class="social-login">
        <div class="divider">
          <span class="divider-line"></span>
          <span class="divider-text">Or register with</span>
          <span class="divider-line"></span>
        </div>

        <button class="social-btn" type="button">
          <img src="img/google.svg" alt="Google" />
          Continue with Google
        </button>

        <button class="social-btn" type="button">
          <img src="img/facebook.svg" alt="Facebook" />
          Continue with Facebook
        </button>
      </div>
    </div>
  </body>
</html>
